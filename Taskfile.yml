version: "3"

tasks:
  "init:backend":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - python3 -m venv venv
      - source ./venv/bin/activate && pip install --upgrade pip && pip install -r requirements-dev.txt && deactivate
    silent: false

  "install-deps:backend":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && pip install --upgrade pip && pip install -r requirements-dev.txt && deactivate
    silent: false

  "build:backend":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - docker stop scuz-patrol > /dev/null 2>&1 || true
      - docker rm scuz-patrol > /dev/null 2>&1 || true
      - docker rmi scuz-patrol:latest > /dev/null 2>&1 || true
      - docker build --platform linux/amd64 -t scuz-patrol:latest .
    silent: false

  "start:backend":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - docker stop scuz-patrol > /dev/null 2>&1 || true
      - docker rm scuz-patrol > /dev/null 2>&1 || true
      - aws sts get-session-token | jq -r '.Credentials | ["AWS_ACCESS_KEY_ID=" + .AccessKeyId, "AWS_SECRET_ACCESS_KEY=" + .SecretAccessKey, "AWS_SESSION_TOKEN=" + .SessionToken] | .[]' > .env-creds
      - docker run --platform linux/amd64 -d --name scuz-patrol -p 9000:8080 --env-file ../.env --env-file .env-creds scuz-patrol:latest
    silent: false

  "build:infra:dev":
    dir: "{{.USER_WORKING_DIR}}/terraform/envs/dev"
    cmds:
      - terraform init
      - terraform plan -out=.current-plan
    silent: false

  "deploy:infra:dev":
    dir: "{{.USER_WORKING_DIR}}/terraform/envs/dev"
    cmds:
      - terraform apply .current-plan
    silent: false

  "set-secrets:dev":
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        set -a
        source .env
        set +a
        echo "Setting Discord bot token..."
        aws secretsmanager put-secret-value --secret-id scuz-patrol-bot-dev/discord-token --secret-string "$DISCORD_BOT_TOKEN" --region us-east-1
        echo "Setting Anthropic API key..."
        aws secretsmanager put-secret-value --secret-id scuz-patrol-bot-dev/anthropic-api-key --secret-string "$ANTHROPIC_API_KEY" --region us-east-1
        echo "Setting Google service account key..."
        aws secretsmanager put-secret-value --secret-id scuz-patrol-bot-dev/google-service-account --secret-string "$GOOGLE_SERVICE_ACCOUNT_KEY" --region us-east-1
        echo "Setting Discord public key..."
        aws secretsmanager put-secret-value --secret-id scuz-patrol-bot-dev/discord-public-key --secret-string "$DISCORD_PUBLIC_KEY" --region us-east-1
        echo "✓ Secrets updated in AWS Secrets Manager"
    silent: false

  "deploy:backend:dev":
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin {{.REPO_URL}}
      - docker tag scuz-patrol:latest {{.REPO_URL}}:latest
      - docker push {{.REPO_URL}}:latest
      - aws lambda update-function-code --function-name {{.FUNCTION_NAME}} --image-uri {{.REPO_URL}}:latest
    vars:
      REPO_URL:
        sh: task describe:infra:dev | jq -r '.image_repo.value.url'
      FUNCTION_NAME:
        sh: task describe:infra:dev | jq -r '.lambda_function.value.name'
    silent: false

  "describe:infra:dev":
    dir: "{{.USER_WORKING_DIR}}/terraform/envs/dev"
    cmds:
      - terraform output --json | jq -r '.'
    silent: false

  "register:commands:dev":
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - source ./backend/venv/bin/activate && python3 scripts/register_commands.py && deactivate
    silent: false

  "test:unit":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && pytest tests/unit_tests -v && deactivate
    silent: false

  "test:integration":
    desc: "Run integration tests (uses start:backend to manage container)"
    dir: "{{.USER_WORKING_DIR}}/backend"
    deps: ["start:backend"]
    cmds:
      - sleep 2
      - source ./venv/bin/activate && pytest tests/integration_tests.py -v && deactivate
    silent: false

  "test:all":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && pytest tests -v --cov=src --cov-report=html && deactivate
    silent: false

  "test:coverage":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && pytest tests -v --cov=src --cov-report=term-missing:skip-covered --cov-branch && deactivate
    silent: false

  "test:watch":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && pytest-watch tests -v --clear && deactivate
    silent: false

  "format":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && black src tests && ruff check --fix src tests && deactivate
    silent: false

  "lint":
    dir: "{{.USER_WORKING_DIR}}/backend"
    cmds:
      - source ./venv/bin/activate && ruff check src tests && mypy src --ignore-missing-imports && deactivate
    silent: false

  "clean":
    cmds:
      - docker stop scuz-patrol > /dev/null 2>&1 || true
      - docker rm scuz-patrol > /dev/null 2>&1 || true
    silent: false
